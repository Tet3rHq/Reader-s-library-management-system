<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- Open book icon -->
  <g transform="translate(50, 50)">
    <!-- Left page -->
    <path d="M -20 -10 Q -20 -15, -15 -15 L -2 -15 L -2 15 L -15 15 Q -20 15, -20 10 Z" 
          fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M 2 -15 L 15 -15 Q 20 -15, 20 -10 L 20 10 Q 20 15, 15 15 L 2 15 Z" 
          fill="white" opacity="0.95"/>
    <!-- Spine shadow -->
    <rect x="-1" y="-15" width="2" height="30" fill="#667eea" opacity="0.3"/>
    <!-- Page lines on left -->
    <line x1="-16" y1="-8" x2="-5" y2="-8" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="-16" y1="-3" x2="-5" y2="-3" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="-16" y1="2" x2="-5" y2="2" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <!-- Page lines on right -->
    <line x1="5" y1="-8" x2="16" y2="-8" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="-3" x2="16" y2="-3" stroke="#667eea" stroke-width="1" opacity="0.4"/>
    <line x1="5" y1="2" x2="16" y2="2" stroke="#667eea" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
